name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e8a3a6d5b7b8f754  # v5.6.0
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install flake8
      - run: flake8 . --max-line-length=120 --exclude=dbt_pipeline/target,dbt_pipeline/dbt_packages,.venv

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e8a3a6d5b7b8f754  # v5.6.0
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --cov=. --cov-report=term-missing

  dbt-check:
    name: dbt-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e8a3a6d5b7b8f754  # v5.6.0
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install dbt-core dbt-snowflake
      - name: dbt parse (compile check — no DB connection required)
        working-directory: dbt_pipeline
        run: dbt parse --profiles-dir .

  docker:
    name: docker
    runs-on: ubuntu-latest
    needs: [lint, test, dbt-check]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR) / Build and push (main)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/ai-healthcare-pipeline:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
