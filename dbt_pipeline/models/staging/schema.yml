version: 2

models:
    - name: stg_person
      description: "Cleaned person records from RAW"
      columns:
        - name: person_id
          tests:
            - not_null
            - unique
        - name: birth_date
          tests:
            - not_null
        - name: gender
          tests:
            - not_null

    - name: stg_condition
      description: "Cleaned condition records from RAW"
      columns:
        - name: patient_id
          tests:
            - not_null
        - name: condition_code
          tests:
            - not_null

    - name: stg_medication
      description: "Cleaned medication records from RAW"
      columns:
        - name: patient_id
          tests:
            - not_null
        - name: medication_code
          tests:
            - not_null

    - name: stg_encounter
      description: "Cleaned encounter records from RAW"
      columns:
        - name: encounter_id
          tests:
            - not_null
            - unique
        - name: patient_id
          tests:
            - not_null